<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Haven</title>
  <link rel="icon" id="favicon" type="image/png" href="/logo.png" />
  <link rel="stylesheet" href="/src/index.css" />
  <style>
    html, body { width: 100%; height: 100%; background: #F9F9FB; }
    body.game-mode { overflow: hidden; }
    body.game-mode * { touch-action: none; }
  </style>
  <script>
    (function() {
      const img = new Image();
      img.src = '/logo.png';
      img.onload = function() {
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        if (ctx) {
          // Zoom by 30% (scale up by 1.3, cropping 15% from each outer edge)
          const zoom = 1.3;
          const sw = img.width / zoom;
          const sh = img.height / zoom;
          const sx = (img.width - sw) / 2;
          const sy = (img.height - sh) / 2;
          
          ctx.drawImage(img, sx, sy, sw, sh, 0, 0, 64, 64);
          
          const link = document.getElementById('favicon') || document.createElement('link');
          link.id = 'favicon';
          link.rel = 'icon';
          link.type = 'image/png';
          link.href = canvas.toDataURL('image/png');
          if (!link.parentNode) {
            document.head.appendChild(link);
          }
        }
      };
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
